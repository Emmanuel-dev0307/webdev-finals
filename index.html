<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Medical Interface</title>

<link rel="stylesheet" href="des.css">


</head>

<body>

    <div class="right-img">

<script>

/* ===== FADE OUT TRANSITION ===== */

function fadeAndGo(page){
    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = page;
    }, 500);
}

/* ===== FEEDBACK BUTTON ===== */

function openFeedback(){
    window.open("https://forms.gle/YF5M9X9bPykgeDLh9", "_blank");
}
