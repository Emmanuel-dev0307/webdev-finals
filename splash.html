<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
    overflow:hidden;
    font-family:Arial, sans-serif;
    cursor:pointer;
    transition:opacity 0.8s ease;
}

/* ===== LOGO ===== */

.logo{
    width:230px;
    max-width:80%;
    animation:float 2s ease-in-out infinite;
    filter:drop-shadow(0 0 15px rgba(0,0,0,0.15));
}

/* ===== TEXT ===== */

.tap-text{
    margin-top:20px;
    color:#0d4fcf;
    font-size:18px;
    letter-spacing:2px;
    opacity:0.8;
}

/* ===== FLOAT EFFECT ===== */

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

/* ===== FADE OUT ===== */

.fade-out{
    opacity:0;
}

</style>

</head>

<body onclick="openMain()">

<!-- ===== LOGO ===== -->

<img src="images/Symptoms_Identifier-removebg-preview.png" alt="Logo" class="logo">

<div class="tap-text">
    TAP ANYWHERE TO START
</div>

<script>

function openMain(){

    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 800);

}

</script>

</body>
</html>
